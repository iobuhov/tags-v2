<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link href="styles.css" rel="stylesheet" type="text/css" /> -->
    <!-- <link rel="stylesheet" href="grid-insert-a3x5.css" /> -->
    <!-- <link rel="stylesheet" href="grid-insert-b2x4.css" /> -->
    <title>Box grid</title>
  </head>
  <body>
    <div class="container"></div>
    <template id="ftag">
      <div class="tag">
        <div class="point"></div>
      </div>
    </template>

    <script>
      const g = 2, num = 8;
      const tag = document.querySelector('#ftag');
      const ct = document.querySelector('.container');

      for (let m = 0; m < g; m += 1) {
        const box = document.createElement('div');
        box.classList += "box"
        for (let n = 0; n < num; n += 1) {
          box.append(tag.content.cloneNode(true));
        }
        ct.appendChild(box);
      }
    </script>
  </body>
</html>
