<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Sale</title>
    <style>
      .insert {
        font-family: monospace;
        background-color: #000;
        color: white;
        width: 151mm;
        height: 118mm;
        display: flex;
        flex-flow: row nowrap;
        overflow: hidden;
      }
      .left {
        width: 7mm;
        display: flex;
        writing-mode: sideways-lr;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
        isolation: isolate;
      }
      .left::before,
      .right::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 118mm;  /* = column height */
        height: 7mm;   /* = column width */
        background-image: url("./img/for_sale/01_01_bar.webp");
        background-size: cover;
        background-position: center;
        transform: translate(-50%, -50%) rotate(90deg);
        z-index: -1;
      }
      .mid {
        background-size: cover;
        flex-grow: 1;
        position: relative;
      }
      .songs {
        position: relative;
        padding: 1em;
      }
      .mid::before {
        display: block;
        content: "";
        width: 100%;
        height: 100%;
        position: absolute;
        z-index: 0;
        background-image: url("./img/for_sale/01_01.webp");
        background-size: cover;
        flex-grow: 1;
        transform: scale(1.02);
      }
      .right {
        width: 7mm;
        display: flex;
        writing-mode: vertical-lr;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
        isolation: isolate;
      }
      .left,
      .right,
      .left .red,
      .right .red {
        color: #000;
        font-weight: bold;
        font-style: italic;
        font-family: Impact, Haettenschweiler, sans-serif;
        -webkit-text-stroke: 1px #fff;
        text-stroke: 1px #fff;
      }
      .red {
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="insert">
      <div class="left"><span class="red">FOR</span>&nbsp;SALE</div>
      <div class="mid">
        <div class="songs"></div>
      </div>
      <div class="right"><span class="red">FOR</span>&nbsp;SALE</div>
    </div>
  </body>
</html>
