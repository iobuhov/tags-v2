<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link href="styles.css" rel="stylesheet" type="text/css" /> -->
    <link rel="stylesheet" href="grid.css" />
    <title>Box grid</title>
  </head>
  <body>
    <template id="ftag">
      <div class="tag">
        <div class="point"></div>
      </div>
    </template>

    <script>
      const num = 12;
      const tag = document.querySelector('#ftag');
      for (let n = 0; n < num; n += 1) {
        document.body.append(tag.content.cloneNode(true));
      }
    </script>
  </body>
</html>
