<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intercom</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }

      .intercom {
        display: grid;
        width: 45mm;
        row-gap: 0;
        background-color: black;
        grid-template-columns: 1fr 1fr;
        border: 1px solid;
      }
      .label {
        height: 12mm;
        background-color: #fff;
        color: black;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid;
        font-family: Helvetica, Arial, sans-serif;
        font-weight: 700;
        font-size: 1.4em;
      }
    </style>
  </head>
  <body>
    <div class="intercom">
      <div class="label">116 C</div>
      <div class="label">116 D</div>
      <div class="label">116 B</div>
      <div class="label"></div>
      <div class="label">116 A</div>
      <div class="label"></div>
      <div class="label">116 E</div>
      <div class="label"></div>
    </div>
  </body>
</html>
